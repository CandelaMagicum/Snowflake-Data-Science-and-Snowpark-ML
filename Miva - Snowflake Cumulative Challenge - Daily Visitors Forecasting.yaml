  - cellType: MARKDOWN
    cellId: bb24b985-6729-47ae-a4ed-67da216d9c84 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: "#### 8- Convert pipeline to sklearn file and Save it into Snowflake Stage"
  - cellType: CODE
    cellId: 019bfaca-7ab8-7eee-9281-9d84b5f98d92 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: |-
        # Recall pipe.fit(train_df) then convert Model into SKLEARN Object 
        daily_visitors_model = pipe.fit(train_df).to_sklearn()
  - cellType: CODE
    cellId: 019bfaca-e6b8-7eee-9281-fce77b166edb # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: |-
        # Save the model locally as joblib
        MODEL_FILE_C = 'daily_visitors_model.joblib'
        joblib.dump(daily_visitors_model, MODEL_FILE_C)
  - cellType: CODE
    cellId: 06508275-2142-489a-ae73-59c14fcbb8f0 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: |-
        # Upload joblib file into the Snowflake stage ML_FILES_C 
        session.file.put(MODEL_FILE_C, "@ML_FILES_C", overwrite=True, auto_compress=False)
  - cellType: CODE
    cellId: 019bfacc-e07c-7eee-9282-f76783a03940 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: |-
        # Manually create a new stage using SQL here for transfer to Snowflake
        session.sql("CREATE STAGE IF NOT EXISTS ML_MODEL_FILE_C").collect()
        # Option to save the pipeline joblibfile file into a Snowflake Internal Stage
        session.file.put(MODEL_FILE_C, "@ML_MODEL_FILE_C", overwrite=True, auto_compress=False)
  - cellType: MARKDOWN
    cellId: 0d1d4a0b-3446-449b-96f2-9ea15a0cdd7f # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: "#### 9- Create Vectorised UDF for Batch Inference"
  - cellType: CODE
    cellId: a7aad9c7-441e-45e4-b643-ea467b7e2a19 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: |
        # IMPORTANT for deploying model and batch inference
        # Define a function to read the model from a file
        @cachetools.cached(cache={})
        def read_file(filename):
            import joblib
            import sys
            import os

            IMPORT_DIRECTORY_NAME = "snowflake_import_directory"
            import_dir = sys._xoptions[IMPORT_DIRECTORY_NAME]

            if import_dir:
                with open(os.path.join(import_dir, filename), 'rb') as file:
                    m = joblib.load(file)
                    return m


        # Create a vectorized UDF for batch inference
        @F.udf(name="daily_visitor_forecasting", # --- update file name ---
                is_permanent=True,
                stage_location = '@ML_MODEL_FILE_C', # --- change stage location name ---
                imports=['@ML_MODEL_FILE_C/daily_visitors_model.joblib'],
                packages=['snowflake-ml-python', 'joblib', 'scikit-learn', 'xgboost', 'cachetools'],
                replace=True,
                session=session)
        def predict_diamond_price(pd_input: T.PandasDataFrame[str, float, float, float, float, float]) -> T.PandasSeries[float]: # --- ensure matching datatypes ---
                # Make sure you have the columns in the expected order in the Pandas DataFrame
            features = ["DAY", "CALENDAR_MTH_DAY_NBR", "CALENDAR_MTH", "CALENDAR_YEAR", "HOLIDAY", "LAST_YEAR_DAILY_VISITORS"] # --- check features are correct ---
            pd_input.columns = features
            model = read_file('daily_visitors_model.joblib') # update file name ---      
            if model is not None:
               forecasting =  model.predict(pd_input)      
               return forecasting
            else:
                raise ValueError("The model is None. Check the model loading process.")
  - cellType: MARKDOWN
    cellId: 44b591f9-c3e9-4179-b2d4-88da520854c4 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: "#### 10- Call UDF to forecast Daily Visitors for DAILY_VISITORS_NEW Table and save results into a Snowflake Table"
  - cellType: CODE
    cellId: 019bfae2-6ee4-7eee-928b-5dff04d15d5f # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: |-
        # Load DAILY_VISITORS_NEW Table into a Snowpark DF
        new_daily_visitors =  session.table('DAILY_VISITORS_NEW')
        # Apply the UDF on Snowpark df
        new_daily_visitors_w_forecasting = new_daily_visitors.with_column("forecasted_daily_visitors", F.call_function("daily_visitor_forecasting", # -- verify udf call name --
                                            F.col("DAY"), F.col("CALENDAR_MTH_DAY_NBR"), F.col("CALENDAR_MTH"), 
                                            F.col("CALENDAR_YEAR"), F.col("HOLIDAY"),  
                                            F.col("LAST_YEAR_DAILY_VISITORS"))
                                            )

        # Show the result
        new_daily_visitors_w_forecasting.show()
  - cellType: CODE
    cellId: 09355f31-3490-47fe-a4b3-c11763ce86f5 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
    cellLabel: null
    config:
      source: |-
        # Write forecasting to a Snowflake table
        new_daily_visitors_w_forecasting.write.mode('overwrite').save_as_table('daily_visitors_new_forecasting')
  - cellType: TEXT
    cellId: 8c74ac28-cf99-43d4-871e-c78e7f3643e6 # DO NOT CHANGE - Hex uses this to match up cells when reimporting the file, and detect any changes to existing cells
